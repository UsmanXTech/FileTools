name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Manual trigger button on GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v6

      # Step 2: Setup Java
      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.0'

      # Step 4: Download Inter fonts automatically
      - name: Download Inter Fonts
        run: |
          mkdir -p app/src/main/res/font
          curl -L "https://github.com/rsms/inter/releases/download/v4.0/Inter-4.0.zip" -o inter.zip
          unzip -o inter.zip -d inter_fonts
          # Copy the needed weights
          find inter_fonts -name "Inter-Regular.ttf" -exec cp {} app/src/main/res/font/inter_regular.ttf \;
          find inter_fonts -name "Inter-SemiBold.ttf" -exec cp {} app/src/main/res/font/inter_semibold.ttf \;
          find inter_fonts -name "Inter-Bold.ttf" -exec cp {} app/src/main/res/font/inter_bold.ttf \;
          echo "Fonts downloaded:"
          ls app/src/main/res/font/

      # Step 5: Build Debug APK
      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      # Step 6: Upload APK as artifact (download from GitHub)
      - name: Upload Debug APK
        uses: actions/upload-artifact@v6
        with:
          name: FileTools-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Step 7: Build Release APK
      - name: Build Release APK
        run: gradle assembleRelease --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v6
        with:
          name: FileTools-Release-APK
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 30
