name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Manual trigger button on GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Setup Java
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 3: Cache Gradle (speeds up future builds)
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Step 4: Download Inter fonts automatically
      - name: Download Inter Fonts
        run: |
          mkdir -p app/src/main/res/font
          curl -L "https://github.com/rsms/inter/releases/download/v4.0/Inter-4.0.zip" -o inter.zip
          unzip -o inter.zip -d inter_fonts
          # Copy the needed weights
          find inter_fonts -name "Inter-Regular.ttf" -exec cp {} app/src/main/res/font/inter_regular.ttf \;
          find inter_fonts -name "Inter-SemiBold.ttf" -exec cp {} app/src/main/res/font/inter_semibold.ttf \;
          find inter_fonts -name "Inter-Bold.ttf" -exec cp {} app/src/main/res/font/inter_bold.ttf \;
          echo "Fonts downloaded:"
          ls app/src/main/res/font/

      # Step 5: Make gradlew executable
      - name: Make Gradle executable
        run: chmod +x gradlew

      # Step 6: Build Debug APK
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # Step 7: Upload APK as artifact (download from GitHub)
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FileTools-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # Step 8: Build Release APK (unsigned)
      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: FileTools-Release-APK-Unsigned
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
